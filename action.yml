name: 'QMLDiff hasher'
description: 'Hashes QMD files, copies structure and pushes to a public repository'
inputs:
  source_root:
    description: 'Root folder with source files'
    required: true
  hashtab_root:
    description: 'Root folder containing hashtab files'
    required: true
  dest_repo:
    description: 'Destination public repository (user/repo)'
    required: true
  token:
    description: 'GitHub token for pushing to destination repo'
    required: true
  commit_message:
    description: 'Custom commit message (optional)'
    required: false
    default: 'Update hashed QMD files'
runs:
  using: 'docker'
  image: docker://ghcr.io/pepikvaio/remarkable_qmldiff-hasher-action:latest
